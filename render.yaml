services:
  - type: web
    name: agrobridge
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate && python manage.py loaddata data_dump.json
    startCommand: gunicorn agro_platform.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: agro_platform.settings.prod
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: agrobridge-db
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false

databases:
  - name: agrobridge-db
    databaseName: agrobridge
    plan: free
